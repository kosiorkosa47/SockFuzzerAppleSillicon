name: Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies
        run: brew install cmake protobuf abseil llvm coreutils

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang \
            -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Smoke test (10 second fuzz run)
        run: |
          cd build
          mkdir -p corpus crashes
          TIMEOUT_CMD="timeout"
          command -v gtimeout >/dev/null 2>&1 && TIMEOUT_CMD="gtimeout"
          set +e
          ASAN_OPTIONS=detect_container_overflow=0:halt_on_error=1 \
            $TIMEOUT_CMD 10 ./net_fuzzer corpus/ -artifact_prefix=crashes/ \
            -max_total_time=5 2>&1
          EXIT_CODE=$?
          set -e
          # Exit codes: 0=clean, 124=timeout(expected), 77=XNU assert(finding)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ] && [ "$EXIT_CODE" -ne 77 ]; then
            echo "FAIL: fuzzer exited with code $EXIT_CODE"
            exit 1
          fi
          if [ "$EXIT_CODE" -eq 77 ]; then
            echo "Smoke test: XNU assertion hit (exit=77) — this is a finding, not a build failure"
          else
            echo "Smoke test passed (exit=$EXIT_CODE)"
          fi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang lld \
            libprotobuf-dev protobuf-compiler llvm

      - name: Configure
        run: |
          mkdir build && cd build
          CC=clang CXX=clang++ cmake -GNinja ..

      - name: Build
        run: cmake --build build

      - name: Smoke test (10 second fuzz run)
        run: |
          cd build
          mkdir -p corpus crashes
          set +e
          ASAN_OPTIONS=detect_container_overflow=0:halt_on_error=1 \
            timeout 10 ./net_fuzzer corpus/ -artifact_prefix=crashes/ \
            -max_total_time=5 2>&1
          EXIT_CODE=$?
          set -e
          # Exit codes: 0=clean, 124=timeout(expected), 77=XNU assert(finding)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ] && [ "$EXIT_CODE" -ne 77 ]; then
            echo "FAIL: fuzzer exited with code $EXIT_CODE"
            exit 1
          fi
          if [ "$EXIT_CODE" -eq 77 ]; then
            echo "Smoke test: XNU assertion hit (exit=77) — this is a finding, not a build failure"
          else
            echo "Smoke test passed (exit=$EXIT_CODE)"
          fi

      - name: Generate seed corpus
        run: |
          cd build
          mkdir -p seed_corpus
          set +e
          ASAN_OPTIONS=detect_container_overflow=0:halt_on_error=0 \
            timeout 20 ./net_fuzzer seed_corpus -max_total_time=10 \
            -dict=../net_fuzzer.dict 2>&1 | tail -3
          set -e
          echo "Seeds generated: $(find seed_corpus -type f | wc -l)"

      - name: Report crash artifacts
        run: |
          cd build
          CRASH_COUNT=$(find crashes/ -name "crash-*" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CRASH_COUNT" -gt 0 ]; then
            echo "Found $CRASH_COUNT crash artifact(s) — these may be XNU assertion hits or real bugs:"
            ls -la crashes/crash-* | head -10
          else
            echo "No crash artifacts generated during smoke test"
          fi

      - name: Coverage report
        run: |
          cd build
          if [ -f net_cov ]; then
            mkdir -p corpus_cov
            ASAN_OPTIONS=detect_container_overflow=0 \
              timeout 30 ./net_cov corpus_cov -max_total_time=10 2>/dev/null || true
            if [ -f default.profraw ]; then
              llvm-profdata merge -sparse default.profraw -o default.profdata
              echo "=== Coverage Summary ==="
              llvm-cov report -instr-profile=default.profdata net_cov 2>/dev/null | tail -5
            fi
          else
            echo "net_cov not built — skipping coverage"
          fi
